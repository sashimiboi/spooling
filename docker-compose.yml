services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: spooling-db
    environment:
      POSTGRES_DB: spooling
      POSTGRES_USER: spooling
      POSTGRES_PASSWORD: spooling
    ports:
      - "5434:5432"
    volumes:
      - spooling_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spooling"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  spooling_data:
